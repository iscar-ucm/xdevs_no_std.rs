name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: write

env:
  # Set this to a value > 0 to enforce a minimum line coverage percentage.
  MIN_COVERAGE_LINES: "0"

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        toolchain:
          - stable
          - nightly
        cargo_flags:
          - "--features std"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      
      - name: Build
        run: cargo build --all ${{ matrix.cargo_flags }}

      - name: Test
        run: cargo test --all ${{ matrix.cargo_flags }}
  
  # Job to check that all the tests succeeded
  test-check:
    needs:
    - test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'

  coverage:
    name: coverage
    needs:
    - test-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests and generate HTML coverage
        run: >-
          cargo llvm-cov --all --features std
          --html --output-dir coverage-html
          --fail-under-lines "${MIN_COVERAGE_LINES}"

      - name: Export lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          cargo llvm-cov report --summary-only > coverage-summary.txt
          {
            echo 'summary<<EOF'
            cat coverage-summary.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload lcov report
        id: upload-lcov
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: lcov.info

      - name: Upload HTML report
        id: upload-html
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage-html

      - name: Comment PR with coverage
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: |
            ## Coverage report

            ```text
            ${{ steps.coverage-summary.outputs.summary }}
            ```

            [Download LCOV artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-lcov.outputs.artifact-id }})

            [Download HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-html.outputs.artifact-id }})
